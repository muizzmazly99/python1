<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart AI Camera Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin-bottom: 8px;
        }

        p {
            color: #cbd5e1;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        img {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        .status {
            margin-top: 16px;
            padding: 12px 16px;
            background: #0b1220;
            border-radius: 12px;
            color: #93c5fd;
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-box {
            background: #0b1220;
            border-radius: 12px;
            padding: 16px;
        }

        .panel-box h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .panel-box p,
        .panel-box li {
            margin: 8px 0;
            color: #e2e8f0;
        }

        ul {
            padding-left: 18px;
            margin: 0;
        }

        .empty {
            color: #94a3b8;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Smart AI Camera Dashboard</h1>
        <p>Live object detection and face recognition from webcam.</p>

        <div class="dashboard">
            <div class="card">
                <img src="/video_feed" alt="Live Camera Feed">
                <div class="status">System Status: Running</div>
            </div>

            <div class="panel">
                <div class="panel-box">
                    <h2>Live Object Statistics</h2>
                    <div id="object-stats" class="empty">Loading...</div>
                </div>

                <div class="panel-box">
                    <h2>Recognized Faces</h2>
                    <div id="face-stats" class="empty">Loading...</div>
                </div>

                <div class="panel-box">
                    <h2>Event Log</h2>
                    <div id="event-log" class="empty">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            const res = await fetch("/stats");
            const data = await res.json();

            let objectsHtml = "";
            const objectEntries = Object.entries(data.objects);

            if (objectEntries.length === 0) {
                objectsHtml = `<p class="empty">No objects detected</p>`;
            } else {
                for (const [obj, count] of objectEntries) {
                    objectsHtml += `<p>${obj}: ${count}</p>`;
                }
                objectsHtml += `<p><b>Last Detected:</b> ${data.last_detected}</p>`;
            }

            let facesHtml = "";
            if (!data.faces || data.faces.length === 0) {
                facesHtml = `<p class="empty">No faces recognized</p>`;
            } else {
                facesHtml = "<ul>" + data.faces.map(face => `<li>${face}</li>`).join("") + "</ul>";
            }

            let eventsHtml = "";
            if (!data.events || data.events.length === 0) {
                eventsHtml = `<p class="empty">No events yet</p>`;
            } else {
                eventsHtml = "<ul>" + data.events.map(event => `<li>${event}</li>`).join("") + "</ul>";
            }

            document.getElementById("object-stats").innerHTML = objectsHtml;
            document.getElementById("face-stats").innerHTML = facesHtml;
            document.getElementById("event-log").innerHTML = eventsHtml;
        }

        loadStats();
        setInterval(loadStats, 1000);
    </script>
</body>

</html>
